# Netlify config for the Faculty Schedule Viewer (static — the repo root IS the site).
# index.html is generated by ../Schedule Viewer/refresh.py — do not hand-edit it.
[build]
  publish = "."

# Ship viewer updates immediately — never cache the HTML.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Keep the school schedule out of search engines (it's link-shared, not secret).
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Referrer-Policy = "no-referrer"
