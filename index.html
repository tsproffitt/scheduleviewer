<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Faculty Schedule Viewer</title>
<style>
  :root{
    --bg:#eef1f5; --panel:#ffffff; --ink:#18212c; --muted:#63717f; --faint:#8b97a3;
    --line:#dde3ea; --line2:#eaeef3; --accent:#1f5c99; --accent-soft:#e9f1f9;
    --chip:#eef2f6; --shadow:0 1px 2px rgba(20,40,60,.05),0 6px 20px rgba(20,40,60,.06);
    --r:12px;
    --g7a:#2f9e8f; --g7b:#22486d; --gC7:#3f7cc0; --g8:#b07a2e; --g9:#4f8b3f;
    --g10:#7b57a3; --g11:#c65f49; --g12:#3f4b64; --gmulti:#7d8b3a;
    --plan:#cdd8c2; --plan-ink:#4a5a3c; --open:#f4f6f8;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font:14px/1.42 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);-webkit-print-color-adjust:exact;print-color-adjust:exact}
  h1,h2,h3{margin:0}
  button{font:inherit;cursor:pointer}

  .topbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:14px;
    padding:11px 18px;background:rgba(255,255,255,.92);backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line)}
  .brand{font-weight:800;font-size:16px;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
  .ver{font-size:11px;color:var(--muted);font-weight:700;background:var(--chip);padding:2px 8px;border-radius:20px;user-select:none}
  .tabs{display:flex;gap:3px;margin-left:8px;background:var(--chip);padding:3px;border-radius:11px}
  .tab{border:0;background:transparent;color:var(--muted);padding:7px 15px;border-radius:8px;font-weight:650}
  .tab:hover{color:var(--accent)}
  .tab.active{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .spacer{flex:1}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 13px;border-radius:9px;font-weight:650}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:#17548e;color:#fff}

  .controls{position:sticky;top:53px;z-index:50;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:11px 18px;background:var(--bg);border-bottom:1px solid var(--line2)}
  .days{display:flex;gap:4px}
  .day-pill{border:1px solid var(--line);background:var(--panel);color:var(--muted);padding:7px 14px;border-radius:9px;font-weight:700}
  .day-pill:hover{border-color:var(--accent);color:var(--accent)}
  .day-pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .sep{width:1px;height:26px;background:var(--line)}
  .filter{position:relative}
  .filter input{font:inherit;padding:8px 12px 8px 32px;border:1px solid var(--line);border-radius:9px;min-width:170px;background:var(--panel) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%2363717f' stroke-width='2' viewBox='0 0 24 24'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4-4'/></svg>") 9px center no-repeat}
  .only-wrap{position:relative}
  .only-btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 12px;border-radius:9px;font-weight:650}
  .only-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .only-panel{position:absolute;top:44px;left:0;z-index:70;background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);width:250px;max-height:340px;display:flex;flex-direction:column}
  .only-panel .oh{display:flex;gap:6px;padding:9px;border-bottom:1px solid var(--line2)}
  .only-panel .oh button{flex:1;border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:5px;font-size:12px;color:var(--muted)}
  .only-list{overflow:auto;padding:5px}
  .oitem{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:7px;cursor:pointer}
  .oitem:hover{background:var(--accent-soft)}
  .oitem input{accent-color:var(--accent);width:15px;height:15px}
  .count{font-size:12.5px;color:var(--muted)}
  .link{background:none;border:0;color:var(--accent);font-weight:650;padding:0}
  .legend{display:flex;flex-wrap:wrap;gap:5px 13px;padding:9px 18px 3px;align-items:center}
  .lg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:600}
  .sw{width:15px;height:15px;border-radius:4px;display:inline-block}

  .wrap{padding:12px 18px 40px}
  .gridcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:auto;max-height:calc(100vh - 210px)}
  table.grid{border-collapse:separate;border-spacing:0;width:100%;min-width:760px}
  table.grid th,table.grid td{border-bottom:1px solid var(--line2);border-right:1px solid var(--line2)}
  table.grid thead th{position:sticky;top:0;z-index:20;background:var(--panel);padding:9px 8px;text-align:center;font-weight:700}
  .ph-lab{font-size:12.5px;color:var(--ink)}
  .ph-time{font-size:10.5px;color:var(--faint);font-weight:600;margin-top:1px}
  .ph-gg{font-size:9px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:4px;padding:0 4px;margin-left:4px}
  .blk{display:inline-block;font-size:9.5px;font-weight:800;background:var(--ink);color:#fff;border-radius:4px;padding:0 4px;margin-right:5px;vertical-align:1px}
  th.corner{position:sticky;left:0;top:0;z-index:30;background:var(--panel);text-align:left;padding:9px 12px;min-width:150px;box-shadow:6px 0 8px -7px rgba(0,0,0,.18)}
  th.rowhead{position:sticky;left:0;z-index:15;background:var(--panel);text-align:left;padding:7px 12px;min-width:150px;max-width:180px;cursor:pointer;box-shadow:6px 0 8px -7px rgba(0,0,0,.14)}
  tbody tr:nth-child(even) th.rowhead{background:#fafbfd}
  tbody tr:hover th.rowhead{background:var(--accent-soft)}
  th.rowhead .rn{font-weight:750;font-size:14px}
  th.rowhead .rm{font-size:10.5px;color:var(--faint);font-weight:600;margin-top:1px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  th.rowhead.pinned .rn::after{content:"●";color:var(--accent);font-size:9px;margin-left:6px;vertical-align:2px}
  td.cell{padding:4px;vertical-align:top;height:52px}
  .blkc{border-radius:8px;padding:6px 8px;height:100%;display:flex;flex-direction:column;justify-content:center;position:relative;min-height:44px}
  .blkc .nm{font-weight:750;font-size:13.5px;line-height:1.15;letter-spacing:-.1px}
  .blkc .sub2{font-size:10.5px;font-weight:600;opacity:.92;margin-top:2px}
  .blkc .rm{position:absolute;right:7px;bottom:5px;font-size:9.5px;font-weight:600;opacity:.7}
  /* sub-parts of one block (50-min class + 25-min study) stack compactly */
  .blkc.sub{min-height:0;padding:4px 8px;margin-bottom:2px}
  .blkc.sub:last-child{margin-bottom:0}
  .blkc.sub .nm{font-size:12px}
  .blkc.sub .rm{position:static;margin-left:6px;opacity:.75}
  .blkc .pt{font-size:9.5px;font-weight:600;opacity:.8;margin-top:1px}
  .cls-w{color:#fff}
  .cell.plan .blkc{background:var(--plan);color:var(--plan-ink)}
  .cell.plan .nm{font-weight:650;font-style:italic;font-size:12.5px}
  .cell.open .blkc{background:var(--open);border:1px dashed var(--line);color:var(--faint)}
  .cell.open .nm{font-weight:600;font-style:italic;font-size:12px}
  .cell.non .blkc{background:transparent;color:var(--faint)}
  .cell.non .nm{font-weight:600;font-style:italic;font-size:12px}
  .cell.void{background:repeating-linear-gradient(135deg,transparent,transparent 6px,#f5f7f9 6px,#f5f7f9 12px)}

  .avail{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
  .avail h2{font-size:16px;margin-bottom:3px;letter-spacing:-.2px}
  .avail .desc{color:var(--muted);font-size:12.5px;margin-bottom:14px}
  .fcontrols{display:flex;flex-wrap:wrap;gap:12px;align-items:end}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  select{font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--ink);min-width:160px}
  .result{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
  @media(max-width:720px){.result{grid-template-columns:1fr}}
  .box{border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .box h3{font-size:13px;padding:10px 13px;background:var(--bg);border-bottom:1px solid var(--line2);display:flex;justify-content:space-between}
  .box h3 .n{color:var(--muted);font-weight:700}
  .grouplab{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);padding:11px 13px 3px}
  .taglist{display:flex;flex-wrap:wrap;gap:7px;padding:6px 13px 13px}
  .tag{border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-weight:700;font-size:12.5px;background:#fbfcfd}
  .tag.room{background:#e9f5ee;border-color:#c3e2ce;color:#1d6b3f}
  .tag.adj{background:#fff;color:var(--muted);font-weight:600;border-style:dashed}
  .empty{padding:14px;color:var(--muted);font-style:italic}
  .mtable-wrap{overflow-x:auto;margin-top:8px}
  .matrix{width:auto;border-collapse:collapse;font-size:12px}
  .matrix th,.matrix td{border:1px solid var(--line2);padding:6px 10px;text-align:center;white-space:nowrap}
  .matrix th{background:var(--bg);font-size:11px;color:var(--muted)}
  .matrix td.yes{background:#e9f5ee;color:#1d6b3f;font-weight:800}
  .matrix td.no{color:#c2ccd6}
  .matrix td.lab{text-align:left;font-weight:700;background:var(--bg)}
  .selrow{display:flex;flex-wrap:wrap;gap:3px;margin:4px 0}
  .selrow label{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;cursor:pointer}
  .selrow input{accent-color:var(--accent)}


  .hint{background:var(--panel);border:1px dashed var(--line);border-radius:var(--r);padding:34px;text-align:center;color:var(--muted)}
  .day-pill.wk{margin-left:2px}

  /* ---- Week view (full week per entity) ---- */
  .wk-cards{display:flex;flex-wrap:wrap;gap:16px}
  .wk-card{flex:1 1 660px;min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .wk-head{display:flex;align-items:baseline;gap:10px;padding:11px 15px;border-bottom:1px solid var(--line2)}
  .wk-name{font-size:17px;font-weight:800;letter-spacing:-.2px}
  .wk-meta{font-size:12px;color:var(--muted)}
  .wk-week{display:grid;grid-template-columns:repeat(5,1fr)}
  .wk-daycol{border-right:1px solid var(--line2);min-width:0}
  .wk-daycol:last-child{border-right:none}
  .wk-dayh{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:center;padding:7px 4px;background:var(--bg);border-bottom:1px solid var(--line2)}
  .wk-cell{padding:5px 6px;border-bottom:1px solid var(--line2)}
  .wk-cell:last-child{border-bottom:none}
  .wk-cell .wt{font-size:9.5px;color:var(--faint);font-weight:600;margin-bottom:3px}
  .wk-cell .blkc{min-height:34px;border-radius:7px}
  .wk-cell.plan .blkc{background:var(--plan);color:var(--plan-ink)}
  .wk-cell.plan .nm{font-weight:650;font-style:italic;font-size:12px}
  .wk-cell.open .blkc{background:var(--open);border:1px dashed var(--line);color:var(--faint)}
  .wk-cell.open .nm{font-weight:600;font-style:italic;font-size:12px}
  .wk-cell.void .blkc{background:repeating-linear-gradient(135deg,transparent,transparent 6px,#f5f7f9 6px,#f5f7f9 12px);min-height:22px}
  @media(max-width:760px){.wk-card{flex:1 1 100%}.wk-week{min-width:680px}.wk-card{overflow-x:auto}}

  /* ---- Find Open board ---- */
  .fd-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .fd-days{display:flex;gap:4px}
  .fd-day{border:1px solid var(--line);background:var(--panel);color:var(--muted);padding:6px 13px;border-radius:8px;font-weight:700}
  .fd-day:hover{border-color:var(--accent);color:var(--accent)}
  .fd-day.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .fd-pers{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 4px}
  .fd-per{display:flex;flex-direction:column;align-items:flex-start;border:1px solid var(--line);background:var(--panel);border-radius:9px;padding:6px 12px;min-width:98px;line-height:1.2}
  .fd-per:hover{border-color:var(--accent)}
  .fd-per b{font-size:12.5px}
  .fd-per span{font-size:10px;color:var(--faint);font-weight:600}
  .fd-per.on{border-color:var(--accent);background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent)}
  .fd-per.on b{color:var(--accent)}
  .fd-summary{display:flex;gap:20px;align-items:baseline;flex-wrap:wrap;margin:18px 0 4px;padding-bottom:13px;border-bottom:1px solid var(--line2)}
  .fd-when{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .fd-stat{font-size:13px;color:var(--muted)}
  .fd-stat b{font-size:16px;color:var(--ink)}
  .fd-section{margin-top:18px}
  .fd-section h3{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}
  .tilegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(116px,1fr));gap:8px}
  .tile{border-radius:11px;padding:9px 12px;min-height:60px;display:flex;flex-direction:column;justify-content:center;border:1px solid var(--line);background:var(--panel)}
  .tile .tl-h{font-weight:800;font-size:15px;letter-spacing:-.2px}
  .tile .tl-s{font-size:11px;font-weight:700;margin-top:2px}
  .tile .tl-c{font-size:11px;font-weight:600;margin-top:2px;line-height:1.2}
  .tile .tl-w{font-size:10.5px;color:var(--muted);margin-top:1px}
  .tile.r-open{background:#e8f4ec;border-color:#bfe0cb}
  .tile.r-open .tl-h{color:#1d6b3f}.tile.r-open .tl-s{color:#2f8f5b}
  .tile.r-busy .tl-h{color:var(--faint);font-size:13.5px}
  .tile.t-free{background:#eaf2fb;border-color:#c6ddf0}
  .tile.t-free .tl-h{color:var(--accent)}.tile.t-free .tl-s{color:var(--accent)}
  .tile.t-busy .tl-h{color:var(--muted);font-weight:750;font-size:13.5px}
  .tile.t-busy .tl-c{color:var(--faint)}
  .tile.adj .tl-h::after{content:" · adj";font-size:9px;color:var(--faint);font-weight:600;letter-spacing:0}

  /* ---- Now dashboard (landing) ---- */
  .now{padding-top:2px}
  .now-hero{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;padding:4px 2px 18px}
  .nh-clock{font-size:30px;font-weight:800;letter-spacing:-.6px;font-variant-numeric:tabular-nums}
  .nh-status{font-size:15px;color:var(--muted);font-weight:600}
  .nh-status b{color:var(--accent)}
  .now-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:start}
  @media(max-width:860px){.now-grid{grid-template-columns:1fr}}
  .now-col{display:flex;flex-direction:column;gap:16px;min-width:0}
  .now-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .nowcard{cursor:pointer;transition:filter .08s}
  .nowcard:hover{filter:brightness(1.07)}
  .now-panel .tile{cursor:pointer;transition:filter .08s}
  .now-panel .tile:hover{filter:brightness(.97)}
  .now-panel h3{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:12px 15px;border-bottom:1px solid var(--line2);display:flex;justify-content:space-between;margin:0}
  .now-panel h3 span{color:var(--ink);font-weight:800}
  .now-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:9px;padding:13px}
  .nowcard{border-radius:9px;padding:9px 11px;color:#fff;min-height:54px;display:flex;flex-direction:column;justify-content:center}
  .nowcard .s{font-weight:750;font-size:13.5px;letter-spacing:-.1px;line-height:1.15}
  .nowcard .m{font-size:11px;opacity:.93;margin-top:3px}
  .now-panel .tilegrid{padding:13px}
  .now-empty{padding:20px 15px;color:var(--faint);font-style:italic;text-align:center;font-size:12.5px}

  /* browser Print path = B&W landscape (the PDF button is the primary export) */
  #printRoot{display:none}
  @media print{
    @page{size:11in 8.5in;margin:0.4in}
    body{background:#fff}
    .topbar,.controls,.legend,.wrap,.no-print{display:none !important}
    #printRoot{display:block}
    .pp{page-break-after:always;break-inside:avoid}
    .pp:last-child{page-break-after:auto}
    .pp-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:10px}
    .pp-head .pn{font-size:19px;font-weight:800}
    .pp-head .pm{font-size:11px;color:#333}
    .pp-week{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .pp-day h4{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#000;border-bottom:1px solid #000;padding-bottom:3px;margin-bottom:6px}
    .pp-cell{border:1px solid #999;border-radius:5px;padding:5px 7px;margin-bottom:5px}
    .pp-cell .pt{font-size:9px;color:#555;font-weight:700}
    .pp-cell .pc{font-size:12px;font-weight:800}
    .pp-cell .pr{font-size:9.5px;color:#333}
    .pp-cell.pl .pc{font-weight:600;font-style:italic;color:#666}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Faculty Schedule Viewer <span class="ver" id="ver"></span></div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-view="now">Now</button>
      <button class="tab" data-view="teacher">Teacher</button>
      <button class="tab" data-view="room">Room</button>
      <button class="tab" data-view="grade">Grade</button>
      <button class="tab" data-view="find">Find Open</button>
    </div>
    <div class="spacer"></div>
    
    <button class="btn" id="pdfBtn">Download PDF</button>
    <button class="btn primary" id="printBtn">Print</button>
  </div>

  <div class="controls" id="controls">
    <div class="days" id="days"></div>
    <div class="sep"></div>
    <div class="only-wrap">
      <button class="only-btn" id="onlyBtn">Show only…</button>
      <div class="only-panel" id="onlyPanel" style="display:none"></div>
    </div>
    <div class="filter"><input id="filter" placeholder="Filter…" autocomplete="off"></div>
    <span class="count" id="count"></span>
    <button class="link" id="clearF" style="display:none">Clear</button>
  </div>
  <div class="legend" id="legend"></div>

  <div class="wrap"><div id="main"></div></div>
  <div id="printRoot"></div>

<script>
const S = {
 "version": "Fall 2026",
 "extracted_from": "Master Schedule - Fall 2026.xlsx",
 "days": [
  "Mon",
  "Tue",
  "Wed",
  "Thu",
  "Fri"
 ],
 "rooms": [
  "105",
  "106",
  "108",
  "201",
  "203",
  "203/205",
  "205",
  "208",
  "301",
  "302",
  "303",
  "304",
  "305",
  "306",
  "Commons",
  "Modular 2",
  "Shop"
 ],
 "non_bookable_rooms": [
  "Commons"
 ],
 "period_slots": [
  {
   "id": "Mon_Opening",
   "day": "Mon",
   "label": "Opening",
   "block": null,
   "minutes": 20,
   "time": "8:30-8:50",
   "grade_group": "all",
   "row_group_start": 0
  },
  {
   "id": "Mon_Period_1",
   "day": "Mon",
   "label": "Period 1",
   "block": "A",
   "minutes": 50,
   "time": "8:50-9:40",
   "grade_group": "all",
   "row_group_start": 1
  },
  {
   "id": "Mon_Period_2",
   "day": "Mon",
   "label": "Period 2",
   "block": "B",
   "minutes": 50,
   "time": "9:45-10:35",
   "grade_group": "all",
   "row_group_start": 2
  },
  {
   "id": "Mon_Period_3",
   "day": "Mon",
   "label": "Period 3",

/* ---------- data ---------- */
const DAYS=S.days;
const TEACHING=/^(Period|Block|Practica|Flex|PRAC)/;
const NONTEACH=/^(Opening|Lunch|Chapel|Morning)/;
function toMin(s){let[h,m]=s.split(':').map(Number);if(h<=7)h+=12;return h*60+m;}
const slots=S.period_slots.map(p=>{const[a,b]=p.time.split('-');return{...p,start:toMin(a),end:toMin(b)};});
const slotById=Object.fromEntries(slots.map(s=>[s.id,s]));
function dayCols(day){return slots.filter(s=>s.day===day).sort((a,b)=>a.start-b.start||a.label.localeCompare(b.label));}
/* Grade-group codes differ by pipeline vintage ('78'/'912' in the Master Data
   export, '7-8'/'9-12' in the retired v16 grid). Normalize before comparing —
   a mismatch silently drops the 7-8 Tue/Thu afternoon columns. */
function normGG(v){return String(v==null?'':v).replace(/[^0-9a-z]/gi,'').toLowerCase();}
function ggLabel(v){const n=normGG(v);return n==='78'?'7–8':n==='912'?'9–12':String(v);}
function dayTeachingCols(day,g){return dayCols(day).filter(s=>TEACHING.test(s.label)&&(!g||normGG(s.grade_group)==='all'||normGG(s.grade_group)===normGG(g)));}

const NONBOOK=new Set(S.non_bookable_rooms||[]);
function atom(r){return r?String(r).split('/'):[];}
function roomSort(a,b){const na=/^\d/.test(a),nb=/^\d/.test(b);if(na&&!nb)return -1;if(!na&&nb)return 1;return na?(+a)-(+b):a.localeCompare(b);}
const ATOMIC_ROOMS=[...new Set(S.rooms.flatMap(atom))].filter(r=>!NONBOOK.has(r)).sort(roomSort);
const FACULTY=new Set(S.faculty_groups.faculty);
// Faculty first (alpha), adjunct grouped at the bottom (alpha).
const TEACHERS=S.teachers.slice().sort((a,b)=>{
  const fa=FACULTY.has(a),fb=FACULTY.has(b);
  if(fa!==fb)return fa?-1:1;
  return a.localeCompare(b);
});
const GRADES=S.grade_rows;
function gg(g){return(g==='7A'||g==='7B'||g==='8')?'78':'912';}

const SESSIONS=[];
S.classes.forEach(c=>c.sessions.forEach(ss=>{
  const sl=slotById[ss.period_id]||{};
  /* Position by the session's OWN time. A 50-min class and its 25-min study
     share one parent block, so the slot window is not the session window. */
  const tm=ss.time||sl.time||'',p=tm.split('-');
  const st=p[0]?toMin(p[0]):(sl.start??null),en=p[1]?toMin(p[1]):(sl.end??null);
  SESSIONS.push({subject:c.subject,teachers:c.teachers,grades:c.grades,room:ss.room,day:ss.day,
    period_id:ss.period_id,label:ss.period_label,minutes:ss.period_minutes,time:tm,start:st,end:en});}));

/* ---------- canonical blocks ----------
   One grid row per period. A block = the longest slot for a (day,label)
   envelope plus every shorter slot fully inside it — so a 75-min block that
   subdivides into a 50-min class + 25-min study is ONE row with both parts
   stacked inside, instead of three "Period 2" rows at 2x height.
   Genuinely staggered bands (Tue/Thu Block C: 9-12 1:05-2:20 vs 7-8 2:00-3:15)
   don't contain one another, so they correctly stay separate blocks. */
const _blkCache={};

function dayBlocks(day){
  if(_blkCache[day])return _blkCache[day];
  const byLabel={};
  slots.filter(s=>s.day===day).forEach(s=>{(byLabel[s.label]=byLabel[s.label]||[]).push(s);});
  const out=[];
  Object.values(byLabel).forEach(grp=>{
    const ordered=grp.slice().sort((a,b)=>(b.end-b.start)-(a.end-a.start)||a.start-b.start);
    const taken=new Set();
    ordered.forEach(env=>{
      if(taken.has(env))return;
      taken.add(env);const members=[env];
      ordered.forEach(o=>{if(!taken.has(o)&&o.start>=env.start&&o.end<=env.end){taken.add(o);members.push(o);}});
      out.push({label:env.label,start:env.start,end:env.end,time:env.time,block:env.block,minutes:env.minutes,members});
    });
  });
  out.sort((a,b)=>a.start-b.start||a.label.localeCompare(b.label));
  return _blkCache[day]=out;
}
function blockMatchesGG(b,g){if(!g)return true;const s=new Set(b.members.map(m=>normGG(m.grade_group)));return s.has('all')||s.has(normGG(g));}
function dayTeachingBlocks(day,g){return dayBlocks(day).filter(b=>TEACHING.test(b.label)&&blockMatchesGG(b,g));}
/* Attach each session to its block: the TIGHTEST block that fully contains it
   (a 50-min Practica A session sits inside both Practica A 1:05-1:55 and the
   concurrent 9-12 Block C 1:05-2:20 — max-overlap alone ties, so prefer the
   snuggest fit). Falls back to max overlap when nothing contains it. */
SESSIONS.forEach(s=>{
  if(s.start==null){s.blk=null;return;}
  const cands=dayBlocks(s.day).filter(b=>s.start<b.end&&b.start<s.end);
  if(!cands.length){s.blk=null;return;}
  const inside=cands.filter(b=>s.start>=b.start&&s.end<=b.end);
  const pool=inside.length?inside:cands;
  let best=pool[0];
  pool.forEach(b=>{
    if(inside.length){ if((b.end-b.start)<(best.end-best.start))best=b; }
    else{ const ov=Math.min(s.end,b.end)-Math.max(s.start,b.start);
          const bov=Math.min(s.end,best.end)-Math.max(s.start,best.start);
          if(ov>bov)best=b; }
  });
  s.blk=blockKey(best);
});
function sessionsInBlock(kind,key,day,b){
  const k=blockKey(b);
  return sessFor(kind,key).filter(s=>s.day===day&&s.blk===k).sort((x,y)=>x.start-y.start);
}
function sessFor(kind,key){
  if(kind==='teacher')return SESSIONS.filter(s=>s.teachers.includes(key));
  if(kind==='room')return SESSIONS.filter(s=>atom(s.room).includes(key));
  return SESSIONS.filter(s=>s.grades.includes(key));}
function overlaps(aS,aE,bS,bE){return aS!=null&&bS!=null&&aS<bE&&bS<aE;}

/* ---------- colors ---------- */
const GC={'7A':'--g7a','7B':'--g7b','8':'--g8','9':'--g9','10':'--g10','11':'--g11','12':'--g12'};
function gradeStyle(grades){
  const g=grades.filter(x=>!/^flex/.test(x));
  if(g.length===1&&GC[g[0]])return{bg:`var(${GC[g[0]]})`};
  const s=new Set(g);
  if(s.size===2&&s.has('7A')&&s.has('7B'))return{bg:'var(--gC7)'};
  const cols=g.map(x=>GC[x]?`var(${GC[x]})`:'var(--gmulti)');
  const a=cols[0]||'var(--gmulti)',b=cols[1]||a;
  return{bg:`linear-gradient(107deg,${a} 0 54%,${b} 54% 100%)`};
}

/* ---------- cell ---------- */
function cellInner(kind,key,b,day){
  const mine=sessionsInBlock(kind,key,day,b);
  if(mine.length){
    const many=mine.length>1;
    return mine.map(s=>{
      const st=gradeStyle(s.grades);
      const room=(kind!=='room'&&s.room)?`<span class="rm">${esc(s.room)}</span>`:'';
      const who=(kind==='room'||kind==='grade')?s.teachers.filter(t=>t!=='TBD').join(', '):'';
      /* sub-parts of one block get a time range so the split stays legible */
      const pt=many?`<span class="pt">${fmtT(s.start)}–${fmtT(s.end)}</span>`:'';
      return `<div class="blkc cls-w${many?' sub':''}" style="background:${st.bg}"><span class="nm">${esc(s.subject)}</span>${who?`<span class="sub2">${esc(who)}</span>`:''}${pt}${room}</div>`;
    }).join('');
  }
  if(NONTEACH.test(b.label))return `<div class="blkc"><span class="nm">${esc(b.label)}</span></div>`;
  const busyElse=sessFor(kind,key).some(s=>s.day===day&&overlaps(s.start,s.end,b.start,b.end));
  if(busyElse)return `<div class="blkc"></div>`;
  const lbl=kind==='teacher'?'Planning':kind==='room'?'Open':'Study';
  return `<div class="blkc"><span class="nm">${lbl}</span></div>`;
}
function cellClass(kind,key,b,day){
  if(sessionsInBlock(kind,key,day,b).length)return 'cell';
  if(NONTEACH.test(b.label))return 'cell non';
  if(sessFor(kind,key).some(s=>s.day===day&&overlaps(s.start,s.end,b.start,b.end)))return 'cell void';
  return kind==='teacher'?'cell plan':'cell open';
}

/* ---------- state ---------- */
const state={view:'now',day:DAYS[0],filter:'',only:new Set(),showPanel:false,
  admin:false,adminUnlocked:false,find:{day:DAYS[0],period:null}};
function entities(v){return v==='teacher'?TEACHERS:v==='room'?ATOMIC_ROOMS:GRADES;}
function focused(){return state.only.size>0;}
function shown(){
  let list=entities(state.view);
  if(focused())list=list.filter(e=>state.only.has(e));
  const f=state.filter.trim().toLowerCase();
  if(f)list=list.filter(e=>e.toLowerCase().includes(f));
  return list;
}
/* focused (subset) comparison drops non-teaching columns; full grid keeps them */
function colsForDay(day,g){const c=dayBlocks(day).filter(b=>blockMatchesGG(b,g));return focused()?c.filter(b=>!NONTEACH.test(b.label)):c;}

function rowMeta(kind,key){
  if(kind==='teacher'){const cs=sessFor('teacher',key);return `${cs.length}× · ${cs.reduce((a,s)=>a+(s.minutes||0),0)}m`;}
  if(kind==='room'){const t=[...new Set(SESSIONS.filter(s=>atom(s.room).includes(key)).flatMap(s=>s.teachers).filter(x=>x!=='TBD'))];return t.slice(0,2).join(', ');}
  return `Grade ${key}`;
}

/* ---------- matrix ---------- */
function renderMatrix(){
  const kind=state.view,keys=shown();
  /* one column per canonical block */
  const cols=colsForDay(state.day,null);
  let head='<tr><th class="corner">'+({teacher:'Teacher',room:'Room',grade:'Grade'}[kind])+'</th>';
  cols.forEach(c=>{const blk=c.block?`<span class="blk">${c.block}</span>`:'';
    const ggs=[...new Set(c.members.map(m=>normGG(m.grade_group)))].filter(x=>x!=='all');
    const ggt=ggs.length===1?`<span class="ph-gg">${ggLabel(ggs[0])}</span>`:'';
    const mins=Math.round(c.end-c.start);
    head+=`<th><div class="ph-lab">${blk}${c.label}${ggt}</div><div class="ph-time">${c.time} · ${mins}m</div></th>`;});
  head+='</tr>';
  let body='';
  keys.forEach(k=>{
    const pin=state.only.has(k)?' pinned':'';
    let row=`<th class="rowhead${pin}" data-e="${esc(k)}"><div class="rn">${esc(k)}</div><span class="rm">${esc(rowMeta(kind,k))}</span></th>`;
    cols.forEach(c=>{row+=`<td class="${cellClass(kind,k,c,state.day)}">${cellInner(kind,k,c,state.day)}</td>`;});
    body+=`<tr>${row}</tr>`;
  });
  const admin=(state.admin&&typeof renderAdmin==='function')?renderAdmin(kind):'';
  document.getElementById('main').innerHTML=admin+`<div class="gridcard"><table class="grid"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
  document.querySelectorAll('th.rowhead').forEach(th=>th.onclick=()=>{toggleOnly(th.dataset.e);});
}

function toggleOnly(e){state.only.has(e)?state.only.delete(e):state.only.add(e);syncOnlyDay();renderControls();renderMain();}
/* Making a Show-only selection defaults to the weekly view; clearing returns to a day matrix. */
function syncOnlyDay(){if(state.only.size)state.day='Week';else if(state.day==='Week')state.day=DAYS[0];}

/* ---------- week view (full week per entity) ---------- */
function renderWeek(){
  const kind=state.view,keys=shown();
  const admin=(state.admin&&typeof renderAdmin==='function')?renderAdmin(kind):'';
  if(!keys.length){document.getElementById('main').innerHTML=admin+`<div class="hint">Nothing to show — adjust your filter or selection.</div>`;return;}
  const cards=keys.map(k=>{
    const g2=kind==='grade'?gg(k):null;
    const cols=DAYS.map(day=>{
      const cells=dayTeachingBlocks(day,g2).map(b=>
        `<div class="wk-cell ${cellClass(kind,k,b,day)}"><div class="wt">${b.label} · ${b.time}</div>${cellInner(kind,k,b,day)}</div>`).join('');
      return `<div class="wk-daycol"><div class="wk-dayh">${day}</div>${cells}</div>`;
    }).join('');
    return `<section class="wk-card"><div class="wk-head"><span class="wk-name">${esc(k)}</span><span class="wk-meta">${esc(rowMeta(kind,k))}</span></div><div class="wk-week">${cols}</div></section>`;
  }).join('');
  document.getElementById('main').innerHTML=admin+`<div class="wk-cards">${cards}</div>`;
}

/* ---------- controls ---------- */
function renderControls(){
  const c=document.getElementById('controls'),lg=document.getElementById('legend');
  if(state.view==='find'||state.view==='now'){c.style.display='none';lg.style.display='none';return;}
  c.style.display='';lg.style.display='';
  const dopts=DAYS.concat(['Week']);
  document.getElementById('days').innerHTML=dopts.map(d=>`<button class="day-pill ${d===state.day?'active':''}${d==='Week'?' wk':''}" data-d="${d}">${d==='Week'?'▦ Week':d}</button>`).join('');
  document.getElementById('days').querySelectorAll('.day-pill').forEach(b=>b.onclick=()=>{state.day=b.dataset.d;renderControls();renderMain();});
  const total=entities(state.view).length,vis=shown().length,noun=state.view==='teacher'?'teachers':state.view==='room'?'rooms':'grades';
  document.getElementById('count').textContent=focused()?`${vis} selected`:`${vis} of ${total} ${noun}`;
  document.getElementById('clearF').style.display=(state.filter||focused())?'':'none';
  document.getElementById('onlyBtn').classList.toggle('on',focused());
  renderOnlyPanel();
  const legend=[['7A','var(--g7a)'],['7B','var(--g7b)'],['Comb. 7','var(--gC7)'],['8','var(--g8)'],['9','var(--g9)'],
    ['10','var(--g10)'],['11','var(--g11)'],['12','var(--g12)'],['Multigrade','linear-gradient(107deg,var(--g8) 0 54%,var(--g9) 54%)'],
    ['Planning','var(--plan)'],['Open / Study','var(--open)']];
  lg.innerHTML=legend.map(([n,c])=>`<span class="lg"><span class="sw" style="background:${c};${n==='Open / Study'?'border:1px dashed var(--line)':''}"></span>${n}</span>`).join('');
}
function renderOnlyPanel(){
  const p=document.getElementById('onlyPanel');p.style.display=state.showPanel?'flex':'none';
  if(!state.showPanel)return;
  const list=entities(state.view);
  p.innerHTML=`<div class="oh"><button data-a="all">Select all</button><button data-a="clear">Clear</button></div>
    <div class="only-list">${list.map(e=>`<label class="oitem"><input type="checkbox" data-o="${esc(e)}" ${state.only.has(e)?'checked':''}><span>${esc(e)}</span></label>`).join('')}</div>`;
  p.querySelectorAll('[data-o]').forEach(cb=>cb.onchange=()=>{cb.checked?state.only.add(cb.dataset.o):state.only.delete(cb.dataset.o);syncOnlyDay();renderControls();renderMain();});
  p.querySelector('[data-a="all"]').onclick=()=>{list.forEach(e=>state.only.add(e));syncOnlyDay();renderControls();renderMain();};
  p.querySelector('[data-a="clear"]').onclick=()=>{state.only.clear();syncOnlyDay();renderControls();renderMain();};
}

/* ---------- Find Open ---------- */
function roomOccupant(room,day,st,en){return SESSIONS.find(s=>s.day===day&&overlaps(s.start,s.end,st,en)&&atom(s.room).includes(room));}
function teacherOccupant(t,day,st,en){return SESSIONS.find(s=>s.day===day&&overlaps(s.start,s.end,st,en)&&s.teachers.includes(t));}
function renderFind(){
  const f=state.find,opts=dayTeachingBlocks(f.day,null).map(b=>({id:blockKey(b),label:b.label,time:b.time,start:b.start,end:b.end,
    grade_group:[...new Set(b.members.map(m=>normGG(m.grade_group)))].filter(x=>x!=='all')[0]||'all'}));
  if(!opts.find(o=>o.id===f.period))f.period=opts.length?opts[0].id:null;
  const sl=opts.find(o=>o.id===f.period)?Object.assign({day:f.day},opts.find(o=>o.id===f.period)):null;
  const dayPills=DAYS.map(d=>`<button class="fd-day ${d===f.day?'on':''}" data-fd="${d}">${d}</button>`).join('');
  const perPills=opts.map(o=>`<button class="fd-per ${o.id===f.period?'on':''}" data-fp="${o.id}"><b>${o.label}</b><span>${o.time}${normGG(o.grade_group)!=='all'?' · '+ggLabel(o.grade_group):''}</span></button>`).join('');
  let board='';
  if(sl){
    const openR=ATOMIC_ROOMS.filter(r=>!roomOccupant(r,sl.day,sl.start,sl.end));
    // Find Open covers faculty only — adjuncts aren't part of the coverage pool.
    const faculty=TEACHERS.filter(t=>FACULTY.has(t));
    const freeN=faculty.filter(t=>!teacherOccupant(t,sl.day,sl.start,sl.end)).length;
    const roomTiles=ATOMIC_ROOMS.map(r=>{
      const o=roomOccupant(r,sl.day,sl.start,sl.end);
      if(!o)return `<div class="tile r-open"><span class="tl-h">${r}</span><span class="tl-s">Open</span></div>`;
      return `<div class="tile r-busy"><span class="tl-h">${r}</span><span class="tl-c">${esc(o.subject)}</span><span class="tl-w">${esc(o.teachers.filter(t=>t!=='TBD').join(', '))}</span></div>`;
    }).join('');
    const teachTiles=faculty.map(t=>{
      const o=teacherOccupant(t,sl.day,sl.start,sl.end);
      if(!o)return `<div class="tile t-free"><span class="tl-h">${t}</span><span class="tl-s">Free</span></div>`;
      return `<div class="tile t-busy"><span class="tl-h">${t}</span><span class="tl-c">${esc(o.subject)}${o.room?' · '+esc(o.room):''}</span></div>`;
    }).join('');
    board=`
      <div class="fd-summary"><span class="fd-when">${sl.label} · ${sl.time}</span>
        <span class="fd-stat"><b>${openR.length}</b> of ${ATOMIC_ROOMS.length} rooms open</span>
        <span class="fd-stat"><b>${freeN}</b> of ${faculty.length} faculty free</span></div>
      <div class="fd-section"><h3>Rooms</h3><div class="tilegrid">${roomTiles}</div></div>
      <div class="fd-section"><h3>Faculty</h3><div class="tilegrid">${teachTiles}</div></div>
      <p class="desc" style="margin-top:14px">Availability is by <b>time overlap</b>, so concurrent Practica / Block C periods are exact. Commons and roomless Study slots aren't counted as bookable rooms. To cover an absent teacher, pick their class's period — every <b>Free</b> teacher is a candidate.</p>`;
  }
  document.getElementById('main').innerHTML=`
    <div class="avail fd"><div class="fd-head"><h2>Find Open</h2><div class="fd-days">${dayPills}</div></div>
      <div class="fd-pers">${perPills}</div>${board}</div>`;
  document.querySelectorAll('[data-fd]').forEach(b=>b.onclick=()=>{f.day=b.dataset.fd;f.period=null;renderMain();});
  document.querySelectorAll('[data-fp]').forEach(b=>b.onclick=()=>{f.period=b.dataset.fp;renderMain();});
}

/* ---------- browser Print pages (B&W) ---------- */
function buildPrint(){
  if(state.view==='find'||state.view==='now'){document.getElementById('printRoot').innerHTML='';return;}
  const kind=state.view,keys=shown();
  const pages=keys.map(k=>{
    const g2=kind==='grade'?gg(k):null;
    const week=DAYS.map(day=>{
      const cells=dayTeachingCols(day,g2).map(sl=>{
        const mine=sessFor(kind,k).filter(s=>s.day===day&&s.period_id===sl.id);
        if(mine.length)return mine.map(s=>{const who=(kind!=='teacher')?s.teachers.filter(t=>t!=='TBD').join(', '):'';
          const rm=(kind!=='room'&&s.room)?` · Rm ${esc(s.room)}`:'';
          return `<div class="pp-cell"><div class="pt">${sl.label} · ${sl.time}</div><div class="pc">${esc(s.subject)}</div>${who||rm?`<div class="pr">${esc(who)}${rm}</div>`:''}</div>`;}).join('');
        const busyElse=sessFor(kind,k).some(s=>s.day===day&&s.period_id!==sl.id&&overlaps(s.start,s.end,sl.start,sl.end));
        if(busyElse)return '';
        return `<div class="pp-cell pl"><div class="pt">${sl.label} · ${sl.time}</div><div class="pc">${kind==='teacher'?'Planning':kind==='room'?'Open':'Study'}</div></div>`;
      }).join('');
      return `<div class="pp-day"><h4>${day}</h4>${cells}</div>`;
    }).join('');
    return `<div class="pp"><div class="pp-head"><span class="pn">${esc(k)}</span><span class="pm">${esc(rowMeta(kind,k))} · Faculty Schedule Viewer · ${S.version}</span></div><div class="pp-week">${week}</div></div>`;
  }).join('');
  document.getElementById('printRoot').innerHTML=pages;
}
function doBrowserPrint(){buildPrint();setTimeout(()=>window.print(),30);}

/* ---------- true landscape B&W PDF (no library, no dialog) ---------- */
function pdfEsc(t){return String(t).normalize('NFKD').replace(/[^\x20-\x7E]/g,'').replace(/\\/g,'\\\\').replace(/([()])/g,'\\$1');}
function entityPageContent(kind,key){
  // Full-page, time-proportional weekly calendar: classes sit at their real
  // clock position on an hour grid, so the page fills top-to-bottom and days
  // line up by time. B&W, dark ink so it prints crisply.
  const PW=792,PH=612,M=36;
  const ops=['0 g 0 G 0.6 w'];
  const text=(x,topY,size,bold,t,gray)=>ops.push(`${gray!=null?gray:0} g BT /${bold?'F2':'F1'} ${size} Tf ${x.toFixed(1)} ${(PH-topY-size).toFixed(1)} Td (${pdfEsc(t)}) Tj ET 0 g`);
  const ctext=(cx,topY,size,bold,t,gray)=>text(cx-(String(t).length*size*0.27),topY,size,bold,t,gray); // ~centered
  const rect=(x,topY,w,h,g,lw)=>ops.push(`${lw||0.6} w ${g!=null?g:0} G ${x.toFixed(1)} ${(PH-topY-h).toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)} re S 0 G 0.6 w`);
  const hline=(x1,x2,yy,g,lw)=>ops.push(`${lw||0.4} w ${g} G ${x1.toFixed(1)} ${(PH-yy).toFixed(1)} m ${x2.toFixed(1)} ${(PH-yy).toFixed(1)} l S 0 G 0.6 w`);
  const vline=(xx,y1,y2,g,lw)=>ops.push(`${lw||0.4} w ${g} G ${xx.toFixed(1)} ${(PH-y1).toFixed(1)} m ${xx.toFixed(1)} ${(PH-y2).toFixed(1)} l S 0 G 0.6 w`);
  const wrap=(t,size,w,maxL)=>{const max=Math.max(5,Math.floor(w/(size*0.5)));const words=String(t).split(' ');const L=[];let cur='';
    words.forEach(wd=>{const tc=cur?cur+' '+wd:wd;if(tc.length<=max)cur=tc;else{if(cur)L.push(cur);cur=wd;}});if(cur)L.push(cur);
    if(L.length>maxL){L.length=maxL;L[maxL-1]=L[maxL-1].slice(0,max-1)+'…';}return L;};

  // header
  text(M,M,16,true,key);
  const brand='Faculty Schedule Viewer   '+S.version;
  text(PW-M-brand.length*4.3,M+3,8.5,false,brand,0.4);
  hline(M,PW-M,M+25,0,0.8);

  // time grid geometry
  const teach=slots.filter(s=>TEACHING.test(s.label));
  const dayStart=Math.min(...teach.map(s=>s.start)), dayEnd=Math.max(...teach.map(s=>s.end));
  const gutter=26, gridL=M+gutter, gridR=PW-M, colW=(gridR-gridL)/5;
  const gridTop=M+56, gridBot=PH-M-6, scale=(gridBot-gridTop)/(dayEnd-dayStart);
  const yFor=m=>gridTop+(m-dayStart)*scale;

  // day headers
  DAYS.forEach((d,ci)=>ctext(gridL+ci*colW+colW/2, M+40, 11, true, d));

  // hour lines + gutter labels
  for(let hm=Math.ceil(dayStart/60)*60; hm<=dayEnd; hm+=60){
    const yy=yFor(hm); hline(gridL,gridR,yy,0.82,0.35);
    const h12=((Math.floor(hm/60)+11)%12)+1;
    text(M+3,yy-4,7.5,false,String(h12),0.45);
  }
  // frame + column separators
  rect(gridL,gridTop,gridR-gridL,gridBot-gridTop,0.55,0.8);
  for(let ci=1;ci<5;ci++) vline(gridL+ci*colW,gridTop,gridBot,0.78,0.5);

  // sessions, positioned by time
  const g2=kind==='grade'?gg(key):null;
  DAYS.forEach((day,ci)=>{
    const colX=gridL+ci*colW;
    const busy=sessFor(kind,key).filter(s=>s.day===day&&s.start!=null);
    busy.forEach(s=>{
      const y0=yFor(s.start), h=Math.max(16,(s.end-s.start)*scale);
      const bx=colX+2, bw=colW-4;
      rect(bx,y0+1.5,bw,h-3,0,0.7);
      text(bx+4,y0+5,6.5,false,s.label+'  '+(s.time||''),0.4);
      const nameL=wrap(s.subject,9.5,bw-8,h>=44?2:1);
      nameL.forEach((ln,i)=>text(bx+4,y0+5+8.5+i*10,9.5,true,ln));
      const who=(kind!=='teacher')?s.teachers.filter(t=>t!=='TBD').join(', '):'';
      const sub=[who,(kind!=='room'&&s.room)?('Rm '+s.room):''].filter(Boolean).join('   ');
      if(sub && h>=40) text(bx+4,y0+5+8.5+nameL.length*10,7.5,false,sub,0.22);
    });
    // free teaching periods (deduped so concurrent Practica/Block C don't stack)
    let lastFree=-1;
    dayTeachingBlocks(day,g2).slice().sort((a,b)=>a.start-b.start).forEach(sl=>{
      if(busy.some(s=>overlaps(s.start,s.end,sl.start,sl.end))) return;
      if(sl.start<lastFree) return; lastFree=sl.end;
      const y0=yFor(sl.start), h=Math.max(15,(sl.end-sl.start)*scale);
      const bx=colX+2, bw=colW-4;
      rect(bx,y0+1.5,bw,h-3,0.62,0.5);
      text(bx+4,y0+5,6.5,false,sl.label+'  '+sl.time,0.5);
      text(bx+4,y0+5+9,8.5,false,kind==='teacher'?'Planning':kind==='room'?'Open':'Study',0.5);
    });
  });
  return ops.join('\n');
}
function buildPDF(pages){
  const parts=[];let pos=0;const off={};
  const push=s=>{parts.push(s);pos+=s.length;};
  const start=n=>{off[n]=pos;};
  push('%PDF-1.4\n');
  start(1);push('1 0 obj\n<</Type/Catalog/Pages 2 0 R>>\nendobj\n');
  const kids=pages.map((_,i)=>`${6+2*i} 0 R`).join(' ');
  start(2);push(`2 0 obj\n<</Type/Pages/Kids[${kids}]/Count ${pages.length}>>\nendobj\n`);
  start(3);push('3 0 obj\n<</Type/Font/Subtype/Type1/BaseFont/Helvetica/Encoding/WinAnsiEncoding>>\nendobj\n');
  start(4);push('4 0 obj\n<</Type/Font/Subtype/Type1/BaseFont/Helvetica-Bold/Encoding/WinAnsiEncoding>>\nendobj\n');
  pages.forEach((cs,i)=>{const cn=5+2*i,pn=6+2*i;
    start(cn);push(`${cn} 0 obj\n<</Length ${cs.length}>>\nstream\n${cs}\nendstream\nendobj\n`);
    start(pn);push(`${pn} 0 obj\n<</Type/Page/Parent 2 0 R/MediaBox[0 0 792 612]/Resources<</Font<</F1 3 0 R/F2 4 0 R>>>>/Contents ${cn} 0 R>>\nendobj\n`);});
  const xrefPos=pos,size=5+2*pages.length;
  let xref='xref\n0 '+size+'\n0000000000 65535 f \n';
  for(let n=1;n<size;n++)xref+=String(off[n]).padStart(10,'0')+' 00000 n \n';
  push(xref);push(`trailer\n<</Size ${size}/Root 1 0 R>>\nstartxref\n${xrefPos}\n%%EOF`);
  return parts.join('');
}
function downloadPDF(){
  if(state.view==='find'||state.view==='now')return alert('Switch to Teacher, Room, or Grade to export a PDF.');
  const kind=state.view,keys=shown();
  if(!keys.length)return alert('No '+kind+'s to export — adjust your filter.');
  const pdf=buildPDF(keys.map(k=>entityPageContent(kind,k)));
  const blob=new Blob([pdf],{type:'application/pdf'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  const label=focused()?keys.length+' '+kind+'s':({teacher:'Teachers',room:'Rooms',grade:'Grades'}[kind]);
  a.href=url;a.download=`Faculty Schedule - ${label} - ${S.version}.pdf`;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}

/* ---------- shell ---------- */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
/* ---------- Now dashboard (clock-driven landing page) ---------- */
let nowKey='';
const TEACH_SLOTS=slots.filter(s=>TEACHING.test(s.label));
function fmtT(m){const h=((Math.floor(m/60)+11)%12)+1;return h+':'+String(m%60).padStart(2,'0');}
function fmtClock(d){const wd=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];let h=d.getHours();const ap=h<12?'AM':'PM';h=((h+11)%12)+1;return `${wd} · ${h}:${String(d.getMinutes()).padStart(2,'0')} ${ap}`;}
function nowDT(){const d=new Date();const gi=d.getDay();return{d,dayName:(gi>=1&&gi<=5)?DAYS[gi-1]:null,t:d.getHours()*60+d.getMinutes()};}
function sessionsAt(day,t){return SESSIONS.filter(s=>s.day===day&&s.start!=null&&s.start<=t&&t<s.end);}
function nextPeriod(dayName,t){
  const order=d=>DAYS.indexOf(d),nowIdx=dayName?order(dayName):-1,seen=new Set(),uniq=[];
  TEACH_SLOTS.forEach(s=>{const k=s.day+'|'+s.start;if(!seen.has(k)){seen.add(k);uniq.push({day:s.day,di:order(s.day),start:s.start});}});
  uniq.sort((a,b)=>a.di-b.di||a.start-b.start);
  const nx=uniq.find(c=>c.di>nowIdx||(c.di===nowIdx&&c.start>t))||uniq[0];
  return{day:nx.day,t:nx.start,sessions:sessionsAt(nx.day,nx.start)};
}
function statusFor(dayName,t){
  if(dayName){const inS=sessionsAt(dayName,t);if(inS.length)return{mode:'now',day:dayName,t,sessions:inS};}
  const nx=nextPeriod(dayName,t);return{mode:'next',day:nx.day,t:nx.t,sessions:nx.sessions};
}
function periodMeta(day,t){
  const cov=TEACH_SLOTS.filter(s=>s.day===day&&s.start<=t&&t<s.end);
  return{label:[...new Set(cov.map(c=>c.label))].join(' / ')||'—',
    time:cov.length?fmtT(Math.min(...cov.map(c=>c.start)))+'–'+fmtT(Math.max(...cov.map(c=>c.end))):'',
    end:cov.length?Math.max(...cov.map(c=>c.end)):null};
}
function headSpanFor(st,now){
  const ex=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  if(st.mode==='now'){const e=periodMeta(st.day,st.t).end;return Math.max(0,Math.ceil((e||ex)-ex))+' min left';}
  if(st.day===nowDT().dayName && st.t>ex) return 'in '+Math.max(0,Math.ceil(st.t-ex))+' min';
  return '—';
}
function openEntity(kind,key){
  state.view=kind;state.only=new Set([key]);state.day='Week';state.filter='';
  const fi=document.getElementById('filter');if(fi)fi.value='';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===kind));
  renderControls();renderMain();window.scrollTo(0,0);
}
const _gi=g=>{const x=(g||[]).find(v=>GRADES.includes(v));return x?GRADES.indexOf(x):99;};
function _sortS(arr){return arr.slice().sort((a,b)=>_gi(a.grades)-_gi(b.grades)||a.subject.localeCompare(b.subject));}
function nowCard(s){const g=gradeStyle(s.grades),who=s.teachers.filter(x=>x!=='TBD').join(', '),rm=s.room?(' · '+s.room):'';
  const tch=s.teachers.find(x=>x!=='TBD')||'';
  return `<div class="nowcard" style="background:${g.bg}"${tch?` data-go-teacher="${esc(tch)}"`:''}><span class="s">${esc(s.subject)}</span><span class="m">${esc(who)}${rm}</span></div>`;}
function renderNow(st){
  st=st||(()=>{const n=nowDT();return statusFor(n.dayName,n.t);})();
  const now=new Date(),{mode,day,t}=st;
  const inS=mode==='now'?_sortS(st.sessions):[];
  const nu=mode==='now'?nextPeriod(day,nowDT().t):{day:st.day,t:st.t,sessions:st.sessions};
  const nuS=_sortS(nu.sessions),nuMeta=periodMeta(nu.day,nu.t);
  const busyR=new Set();st.sessions.forEach(s=>atom(s.room).forEach(r=>busyR.add(r)));
  const openR=ATOMIC_ROOMS.filter(r=>!busyR.has(r));
  const busyT=new Set();st.sessions.forEach(s=>s.teachers.forEach(x=>busyT.add(x)));
  const faculty=TEACHERS.filter(x=>FACULTY.has(x)),freeFac=faculty.filter(x=>!busyT.has(x));
  const meta=periodMeta(day,t);
  const status=mode==='now'?`<b>In session</b> · ${esc(meta.label)} · ${meta.time}`
    :`Nothing in session right now · <b>Up next:</b> ${day} · ${esc(meta.label)} at ${fmtT(t)}`;
  const inCards=inS.length?inS.map(nowCard).join(''):'<div class="now-empty">No classes in session right now.</div>';
  const nuCards=nuS.length?nuS.map(nowCard).join(''):'<div class="now-empty">—</div>';
  const roomTiles=openR.map(r=>`<div class="tile r-open" data-go-room="${r}"><span class="tl-h">${r}</span><span class="tl-s">Open</span></div>`).join('')||'<div class="now-empty">Every room in use.</div>';
  const facTiles=freeFac.map(x=>`<div class="tile t-free" data-go-teacher="${esc(x)}"><span class="tl-h">${x}</span><span class="tl-s">Planning</span></div>`).join('')||'<div class="now-empty">All faculty teaching.</div>';
  document.getElementById('main').innerHTML=`
   <div class="now">
    <div class="now-hero"><div class="nh-clock" id="nowClock"></div><div class="nh-status">${status}</div></div>
    <div class="now-grid">
      <div class="now-col">
        <section class="now-panel"><h3>In session <span id="nowCount">${headSpanFor(st,now)}</span></h3><div class="now-cards">${inCards}</div></section>
        <section class="now-panel"><h3>Next up <span>${nu.day} · ${esc(nuMeta.label)} · ${nuMeta.time}</span></h3><div class="now-cards">${nuCards}</div></section>
      </div>
      <div class="now-col">
        <section class="now-panel"><h3>Open rooms <span>${openR.length} / ${ATOMIC_ROOMS.length}</span></h3><div class="tilegrid">${roomTiles}</div></section>
        <section class="now-panel"><h3>Faculty on planning <span>${freeFac.length} / ${faculty.length}</span></h3><div class="tilegrid">${facTiles}</div></section>
      </div>
    </div></div>`;
  const c=document.getElementById('nowClock');if(c)c.textContent=fmtClock(now);
  document.querySelectorAll('#main [data-go-teacher]').forEach(el=>el.onclick=()=>openEntity('teacher',el.dataset.goTeacher));
  document.querySelectorAll('#main [data-go-room]').forEach(el=>el.onclick=()=>openEntity('room',el.dataset.goRoom));
  nowKey=mode+'|'+day+'|'+t;
}
function nowTick(){
  const now=new Date(),n=nowDT();
  const c=document.getElementById('nowClock');if(c)c.textContent=fmtClock(now);
  const st=statusFor(n.dayName,n.t),key=st.mode+'|'+st.day+'|'+st.t;
  if(state.view!=='now')return;
  if(key!==nowKey){renderNow(st);return;}
  const span=document.getElementById('nowCount');if(span)span.textContent=headSpanFor(st,now);
}
function renderMain(){if(state.view==='now')renderNow();else if(state.view==='find')renderFind();else if(state.day==='Week')renderWeek();else renderMatrix();}
document.getElementById('tabs').onclick=e=>{const b=e.target.closest('.tab');if(!b)return;
  state.view=b.dataset.view;state.only.clear();state.showPanel=false;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===b));renderControls();renderMain();};
document.getElementById('filter').oninput=e=>{state.filter=e.target.value;renderControls();renderMain();};
document.getElementById('clearF').onclick=()=>{state.filter='';state.only.clear();syncOnlyDay();document.getElementById('filter').value='';renderControls();renderMain();};
document.getElementById('onlyBtn').onclick=()=>{state.showPanel=!state.showPanel;renderOnlyPanel();};
document.addEventListener('click',e=>{if(!e.target.closest('.only-wrap')&&state.showPanel){state.showPanel=false;renderOnlyPanel();}});
document.getElementById('printBtn').onclick=doBrowserPrint;
document.getElementById('pdfBtn').onclick=downloadPDF;
document.getElementById('ver').textContent=S.version;

renderControls();renderMain();
setInterval(nowTick,1000);
</script>
